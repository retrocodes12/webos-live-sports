services:
  - type: web
    name: sportzx-api
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PRIVATE_SITE_BASE_URL
        value: https://totalsportek.army/
      - key: UPSTREAM_CATALOG_URL
        sync: false
      - key: UPSTREAM_AUTH_BEARER
        sync: false
      - key: UPSTREAM_AUTH_HEADER_NAME
        sync: false
      - key: UPSTREAM_AUTH_HEADER_VALUE
        sync: false
      - key: STREAM_RESOLVER_URL
        sync: false
      - key: STREAM_RESOLVER_AUTH_BEARER
        sync: false
      - key: STREAM_RESOLVER_AUTH_HEADER_NAME
        sync: false
      - key: STREAM_RESOLVER_AUTH_HEADER_VALUE
        sync: false
      - key: PRIVATE_SITE_SEARCH_URL_TEMPLATE
        value: ""
      - key: PRIVATE_SITE_MATCH_LINK_SELECTOR
        value: a[href*="/game/"]
      - key: PRIVATE_SITE_CATALOG_CARD_SELECTOR
        value: a.text-decoration-none.nav-link2[href*="/game/"]
      - key: PRIVATE_SITE_CATALOG_LINK_SELECTOR
        value: ""
      - key: PRIVATE_SITE_CATALOG_TITLE_SELECTOR
        value: ""
      - key: PRIVATE_SITE_CATALOG_LEAGUE_SELECTOR
        value: div.col.fs-7.fw-bold.text-white.m-2 .ps-3
      - key: PRIVATE_SITE_CATALOG_ROUND_SELECTOR
        value: ""
      - key: PRIVATE_SITE_CATALOG_VENUE_SELECTOR
        value: ""
      - key: PRIVATE_SITE_CATALOG_KICKOFF_SELECTOR
        value: ""
      - key: PRIVATE_SITE_CATALOG_STATUS_SELECTOR
        value: div[class*="Aj"] span
      - key: PRIVATE_SITE_CATALOG_SCORE_SELECTOR
        value: ""
      - key: PRIVATE_SITE_CATALOG_SUMMARY_SELECTOR
        value: ""
      - key: PRIVATE_SITE_DEFAULT_SPORT_ID
        value: sports
      - key: PRIVATE_SITE_DEFAULT_SPORT_NAME
        value: Live Sports
      - key: PRIVATE_SITE_DEFAULT_SPORT_ACCENT
        value: "#22c55e"
      - key: PRIVATE_SITE_DEFAULT_SPORT_SHORT_LABEL
        value: LIVE
      - key: PRIVATE_SITE_DEFAULT_LEAGUE
        value: Live Streams
      - key: PRIVATE_SITE_CATALOG_LIMIT
        value: "24"
      - key: PRIVATE_SITE_PROVIDER_LINK_SELECTOR
        value: .data-row a.nocolor[href]
      - key: PRIVATE_SITE_STREAM_LINK_SELECTOR
        value: a[href], iframe[src], source[src], video[src]
      - key: PRIVATE_SITE_FINAL_STREAM_SELECTOR
        value: source[src], video[src], a[href*=".m3u8"], a[href*=".mpd"], a[href*=".mp4"]
      - key: PRIVATE_SITE_FINAL_EMBED_SELECTOR
        value: iframe[src]
      - key: PRIVATE_SITE_RESOLVE_PROVIDER_PAGES
        value: "true"
      - key: PRIVATE_SITE_FALLBACK_TO_PAGE_EMBED
        value: "true"
      - key: PRIVATE_SITE_MAX_EMBED_DEPTH
        value: "3"
      - key: PRIVATE_SITE_FETCH_RETRIES
        value: "2"
      - key: PRIVATE_SITE_MAX_PROVIDER_CANDIDATES
        value: "12"
      - key: CATALOG_CACHE_TTL_MS
        value: "30000"
      - key: STREAM_CACHE_TTL_MS
        sync: false
      - key: STREAM_RESOLVE_RETRIES
        sync: false
      - key: UPSTREAM_TIMEOUT_MS
        value: "12000"
